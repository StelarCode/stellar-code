<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Stellar Code</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#FFFACA;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#151613;
}

.logo{
font-size:26px;
font-weight:bold;
color:#FFFACA;
}

.menu a{
margin-left:25px;
text-decoration:none;
color:#FFFACA;
font-weight:bold;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:100px 80px;
}

.hero-text{
max-width:500px;
}

.hero-text h1{
font-size:55px;
color:#004F39;
margin-bottom:20px;
}

.hero-text p{
font-size:20px;
color:#333;
margin-bottom:30px;
}

.btn{
background:#004F39;
color:white;
border:none;
padding:15px 35px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.btn:hover{
background:#151613;
}

/* IMAGEN */

.hero-img img{
width:420px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">
Stellar Code
</div>

<div class="menu">
<a href="#">Servicios</a>
<a href="#">Resultados</a>
<a href="#">Contacto</a>
</div>

</div>

<section class="hero">

<div class="hero-text">

<h1>
Marketing digital que impulsa tu negocio
</h1>

<p>
En Stellar Code ayudamos a pequeñas empresas a crecer
con estrategias de marketing digital, diseño y publicidad.
</p>

<button class="btn">
Solicitar asesoría
</button>

</div>

<div class="hero-img">

<img src="https://images.unsplash.com/photo-1551434678-e076c223a692">

</div>

</section>

</body>
</html>
